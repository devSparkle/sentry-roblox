name: "Roblox"

on:
  push:
    paths:
      - "wally.toml"
  workflow_dispatch:

jobs:
  workflow:
    uses: ungms/.github/.github/workflows/roblox.yml@main
    
    with:
      ROBLOX_ASSETID: 11721929587
    secrets:
      WALLY_AUTH: ${{ secrets.WALLY_AUTH }}
      ROBLOX_AUTH: ${{ secrets.ROBLOX_AUTH }}
    permissions:
        contents: write
